<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>C Programming Mastery Firebase</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,sans-serif;background:#0f172a;color:#f8fafc}
.hidden{display:none}
.auth{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#1e293b;border-radius:16px;padding:20px}
.auth .card{width:100%;max-width:420px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none}
button{background:#3b82f6;color:white;cursor:pointer}
.sidebar{position:fixed;left:0;top:0;width:280px;height:100%;overflow:auto;background:#111827;padding:20px}
.main{margin-left:300px;padding:20px}
.lesson{background:#1e293b;padding:20px;border-radius:14px;margin:15px 0}
.progressbar{height:20px;background:#334155;border-radius:20px;overflow:hidden}
.progress{height:100%;width:0;background:#3b82f6}
pre{background:#020617;padding:12px;border-radius:8px;overflow:auto}
@media(max-width:768px){
.sidebar{position:relative;width:100%;height:auto}
.main{margin-left:0;padding:15px}
input,button{font-size:16px}
}
</style>
</head>
<body>

<div id="authPage" class="auth">
  <div class="card">
    <h2>Student Login / Signup</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <p id="msg"></p>
  </div>
</div>

<div id="coursePage" class="hidden">
<div class="sidebar">
<h2>C Programming Mastery</h2>
<p id="userEmail"></p>
<div class="progressbar"><div class="progress" id="p"></div></div>
<p id="pt">0%</p>
<button onclick="logout()">Logout</button>
</div>

<div class="main">
<h1>Learn C Programming</h1>

<div class="lesson"><h2>Module 1: Introduction</h2>
<p>C is a programming language developed by Dennis Ritchie.</p>
<label><input type="checkbox" class="m"> Completed</label></div>

<div class="lesson"><h2>Module 2: Program Structure</h2>
<pre>#include &lt;stdio.h&gt;
int main(){ return 0; }</pre>
<label><input type="checkbox" class="m"> Completed</label></div>

<div class="lesson"><h2>Module 3: Variables</h2>
<pre>int age=18;</pre>
<label><input type="checkbox" class="m"> Completed</label></div>

<div class="lesson"><h2>Module 4: Quiz</h2>
<input id="ans" placeholder="Starting function in C?">
<button onclick="quiz()">Submit</button>
<p id="res"></p>
<label><input type="checkbox" class="m"> Completed</label></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "c-programming-mastery.firebaseapp.com",
  projectId: "c-programming-mastery",
  storageBucket: "c-programming-mastery.firebasestorage.app",
  messagingSenderId: "994282427327",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async ()=>{
 try{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
  msg.innerText="Account created";
 }catch(e){msg.innerText=e.message;}
};

window.login = async ()=>{
 try{
  await signInWithEmailAndPassword(auth,email.value,password.value);
 }catch(e){msg.innerText=e.message;}
};

window.logout = async ()=>{ await signOut(auth); };

async function saveProgress(){
 const user=auth.currentUser;
 if(!user) return;
 const data=[...document.querySelectorAll('.m')].map(x=>x.checked);
 await setDoc(doc(db,"students",user.uid),{progress:data},{merge:true});
}

async function loadProgress(user){
 const snap=await getDoc(doc(db,"students",user.uid));
 if(snap.exists()){
   const data=snap.data().progress||[];
   document.querySelectorAll('.m').forEach((x,i)=>x.checked=data[i]||false);
 }
 update();
}

window.update = async ()=>{
 let c=[...document.querySelectorAll('.m')];
 let d=c.filter(x=>x.checked).length;
 let p=Math.round((d/c.length)*100);
 document.getElementById('p').style.width=p+'%';
 document.getElementById('pt').innerText=p+'% Complete';
 await saveProgress();
};

document.addEventListener('change',e=>{
 if(e.target.classList.contains('m')) update();
});

onAuthStateChanged(auth, async(user)=>{
 if(user){
   authPage.classList.add('hidden');
   coursePage.classList.remove('hidden');
   userEmail.innerText=user.email;
   await loadProgress(user);
 }else{
   authPage.classList.remove('hidden');
   coursePage.classList.add('hidden');
 }
});

window.quiz=()=>{
 res.innerText=ans.value.toLowerCase().includes('main') ? 'Correct' : 'Incorrect';
};
</script>
</body>
</html>
